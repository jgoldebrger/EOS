name: Scorecard Off-Track Digest

on:
  schedule:
    # Mondays at 14:00 UTC (9am US Eastern during standard time)
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scorecard-off-track-digest edge function
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] && [ -n "$SUPABASE_PROJECT_REF" ]; then
            SUPABASE_URL="https://${SUPABASE_PROJECT_REF}.supabase.co"
          fi
          if [ -z "$SUPABASE_URL" ]; then
            echo "Add SUPABASE_URL or SUPABASE_PROJECT_REF (repository variable) to GitHub."
            exit 1
          fi
          if [ -z "$SUPABASE_SECRET_KEY" ]; then
            echo "Add SUPABASE_SECRET_KEY to GitHub repository secrets."
            exit 1
          fi
          curl -sS -X POST "$SUPABASE_URL/functions/v1/scorecard-off-track-digest" \
            -H "apikey: $SUPABASE_SECRET_KEY" \
            -H "Authorization: Bearer $SUPABASE_SECRET_KEY" \
            -H "Content-Type: application/json" \
            -d '{}'
