name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Install system dependencies
        run: |
          # GHA images occasionally ship broken Microsoft apt mirrors; jq/zstd are from Ubuntu main.
          for f in /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure*; do
            [ -e "$f" ] && sudo rm -f "$f"
          done
          sudo apt-get update
          sudo apt-get install -y jq zstd

      - name: Install npm dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Cache Supabase Docker images
        uses: actions/cache@v4
        id: docker-cache
        with:
          path: /tmp/supabase-docker-images
          key: supabase-docker-${{ hashFiles('supabase/config.toml') }}

      - name: Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: |
          for f in /tmp/supabase-docker-images/*.tar.zst; do
            [ -f "$f" ] && zstd -d --stdout "$f" | docker image load
          done

      - name: Run Playwright E2E with seeded Supabase
        run: bash scripts/ci-e2e.sh

      - name: Save Docker images to cache
        if: steps.docker-cache.outputs.cache-hit != 'true' && !cancelled() && success()
        run: |
          mkdir -p /tmp/supabase-docker-images
          docker images --format '{{.Repository}}:{{.Tag}}' \
            | grep -E 'supabase|postgrest|kong|darthsim' \
            | while read -r img; do
              name=$(echo "$img" | tr '/:.' '_')
              docker image save "$img" | zstd -T0 -3 -o "/tmp/supabase-docker-images/${name}.tar.zst"
            done

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
