name: L10 Schedule Reminders

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger l10-schedule-reminders edge function
        env:
          SUPABASE_URL: https://intfblfzreghhshcztuw.supabase.co
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          if [ -z "$SUPABASE_SECRET_KEY" ]; then
            echo "Add SUPABASE_SECRET_KEY to GitHub repository secrets."
            exit 1
          fi
          curl -sS -X POST "$SUPABASE_URL/functions/v1/l10-schedule-reminders" \
            -H "Authorization: Bearer $SUPABASE_SECRET_KEY" \
            -H "Content-Type: application/json" \
            -d '{}'
