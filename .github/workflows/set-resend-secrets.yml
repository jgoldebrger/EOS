name: Set Resend Secrets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Set Resend edge function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_FROM_EMAIL: ${{ secrets.NOTIFICATION_FROM_EMAIL }}
        run: |
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Add SUPABASE_PROJECT_REF to GitHub repository secrets."
            exit 1
          fi
          if [ -z "$RESEND_API_KEY" ] || [ -z "$NOTIFICATION_FROM_EMAIL" ]; then
            echo "Add RESEND_API_KEY and NOTIFICATION_FROM_EMAIL to GitHub repository secrets first."
            exit 1
          fi
          supabase secrets set \
            "RESEND_API_KEY=$RESEND_API_KEY" \
            "NOTIFICATION_FROM_EMAIL=$NOTIFICATION_FROM_EMAIL" \
            --project-ref "$SUPABASE_PROJECT_REF"
