name: Set Resend Secrets

on:
  workflow_dispatch:

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set Resend edge function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_FROM_EMAIL: ${{ secrets.NOTIFICATION_FROM_EMAIL }}
        run: |
          if [ -z "$RESEND_API_KEY" ] || [ -z "$NOTIFICATION_FROM_EMAIL" ]; then
            echo "Add RESEND_API_KEY and NOTIFICATION_FROM_EMAIL to GitHub repository secrets first."
            exit 1
          fi
          supabase secrets set \
            "RESEND_API_KEY=$RESEND_API_KEY" \
            "NOTIFICATION_FROM_EMAIL=$NOTIFICATION_FROM_EMAIL" \
            --project-ref intfblfzreghhshcztuw
